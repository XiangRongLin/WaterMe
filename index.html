<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaterMe 🌿</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Home screen / PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4a7c59" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WaterMe" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🌿 WaterMe</h1>
    <button id="btn-add-plant" class="btn btn-primary">+ Add Plant</button>
  </header>

  <main>
    <div id="sort-bar" hidden>
      <label for="sort-select">Sort by</label>
      <select id="sort-select">
        <option value="name-asc">Name (A → Z)</option>
        <option value="name-desc">Name (Z → A)</option>
        <option value="watered-asc">Last watered (oldest first)</option>
        <option value="watered-desc">Last watered (newest first)</option>
      </select>
    </div>
    <div id="plant-list"></div>
    <p id="empty-state" hidden>No plants yet — add your first one!</p>
  </main>

  <!-- Add / Edit Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Add Plant</h2>

      <form id="plant-form" novalidate>
        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label for="input-name">Plant name <span class="required">*</span></label>
          <input type="text" id="input-name" placeholder="e.g. Monstera" required />
        </div>

        <div class="form-group">
          <label for="input-photo">Photo (optional)</label>
          <div class="photo-upload-area" id="photo-upload-area">
            <img id="photo-preview" src="" alt="Preview" hidden />
            <span id="photo-placeholder">Click or drag to upload an image</span>
            <input type="file" id="input-photo" accept="image/jpeg,image/jpg,image/png,image/webp,image/gif" multiple />
          </div>
          <button type="button" id="btn-remove-photo" class="btn btn-text" hidden>Remove photo</button>
        </div>

        <div class="form-group">
          <label for="input-last-watered">Last watered</label>
          <input type="date" id="input-last-watered" />
        </div>

        <div class="form-group">
          <label for="input-interval">Water every (optional)</label>
          <div class="interval-row">
            <input type="number" id="input-interval" min="1" max="365" placeholder="7" />
            <span>days</span>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="btn-save" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Hidden canvas for image resizing -->
  <canvas id="resize-canvas" hidden></canvas>

  <!-- Bulk Add Overlay -->
  <div id="bulk-overlay" class="modal-overlay" hidden>
    <div class="modal bulk-modal">
      <h2>Add Plants</h2>
      <p class="bulk-hint">Fill in the details for each plant, then save all at once.</p>
      <div id="bulk-entries"></div>
      <div class="form-actions">
        <button type="button" id="btn-bulk-cancel" class="btn btn-secondary">Cancel</button>
        <button type="button" id="btn-bulk-save" class="btn btn-primary">Save all</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
